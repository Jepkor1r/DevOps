apiVersion: v1
kind: Pod
metadata:
  name: postgres-pod
  labels:
    name: postgres-pod
    app: project-voting-app
spec:
  containers:
    - name: postgres-container
      image: postgres:9.6
      ports:
        - containerPort: 5432
      env:
          - name: POSTGRES_USER
            value: "postgres"
          - name: POSTGRES_PASSWORD
            value: "password"