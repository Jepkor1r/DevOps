apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    name: redis-deployment
    app: project-voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      name: redis-pod
      app: project-voting-app
  template:
    metadata:
      name: redis-pod
      labels:
        name: redis-pod
        app: project-voting-app
    spec:
      containers:
        - name: redis-container
          image: redis:7.0
          ports:
            - containerPort: 6379