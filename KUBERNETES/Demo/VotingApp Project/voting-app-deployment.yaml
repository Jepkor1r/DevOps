apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app-deployment
  labels:
    name: voting-app-deployment
    app: project-voting-app 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-voting-app
  template:
    metadata:
      name: voting-app-pod
      labels:
        name: voting-app-pod
        app: project-voting-app
    spec:
      containers:
        - name: voting-app-container   
          image: kodekloud/examplevotingapp_vote:v1
          ports:
            - containerPort: 80 