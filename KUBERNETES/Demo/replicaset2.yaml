apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-replicaset
  labels:
    app: my-app
    type: backend
spec:
  replicas: 2
  selector:
   matchLabels:
     type: backend
  template:
    metadata:
      labels:
        app: my-app
        type: backend
    spec:
      containers:
      - name: my-container
        image: nginx:latest
        ports:
        - containerPort: 80